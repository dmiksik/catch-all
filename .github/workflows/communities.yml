name: Build communities report

on:
  workflow_dispatch: {}
  schedule:
    - cron: "12 6 * * *"   # denně 06:12 UTC

permissions:
  contents: write     # kvůli commit/push do main
  pages: write        # kvůli Pages deploy
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests markdown pandas pyarrow matplotlib

      - name: Communities report (nrp_by_community.md)
        run: python communities.py

      - name: Harvest datasets (records + velikosti)
        run: python harvest_nrp.py --out nrp_dump --no-duckdb

      - name: Generate graphs (velikosti + čtvrtletí)
        run: python datasets-volume-graphs.py

      - name: TOP 10 datasets
        run: python top10_datasets.py

      - name: Size statistics (size_stats.md)
        run: python datasets-volume.py > nrp_dump/size_stats.md

      - name: Commit report to main (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add nrp_by_community.md nrp_dump || true
          if ! git diff --cached --quiet; then
            git commit -m "Update report: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Build static site (public/index.html + grafy)
        run: python build_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact (site)
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  publish-wiki:
    needs: build-and-commit
    runs-on: ubuntu-latest
    permissions:
      contents: write   # potřebujeme push do .wiki repozitáře
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v7
  
      - name: Checkout wiki repo
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          ref: master                 # 🔹 ujisti se, že pracujeme na master (Wiki)
          token: ${{ secrets.GITHUB_TOKEN }}
  
      - name: Copy report into wiki
        run: |
          set -euo pipefail
          # název wiki stránky – stabilní a s ASCII pomlčkou
          PAGE="Catch‐all Communities and Records.md"
          cp -f nrp_by_community.md "wiki/${PAGE}"
  
          # vytvoř domovskou stránku s odkazem (jen pokud neexistuje)
          if [ ! -f wiki/Home.md ]; then
            printf "[[Catch-all Communities]]\n" > wiki/Home.md
          fi
  
      - name: Commit & push wiki
        run: |
          set -euo pipefail
          cd wiki
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Update NRP Communities report (from Actions)"
            git push origin master      # 🔹 explicitně push na master
          else
            echo "No wiki changes to commit."
          fi

  deploy:
    needs: build-and-commit
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
